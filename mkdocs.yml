site_name: Documentation Terrilink
site_description: Documentation officielle de la plateforme Terrilink — réseaux alumni et diasporas.
site_author: Terrilink
site_url: https://docs.terrilink.io/

repo_name: terrilinkio/terrilink-docs
repo_url: https://github.com/terrilinkio/terrilink-docs
edit_uri: edit/main/docs/

copyright: |
  &copy; 2026 Terrilink. Tous droits réservés. —
  <a href="mailto:contact@terrilink.io">contact@terrilink.io</a>

theme:
  name: material
  language: fr
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mode clair
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.tabs.link
    - toc.follow

extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/solid/globe
      link: https://terrilink.io
      name: Site Terrilink
    - icon: fontawesome/solid/envelope
      link: mailto:contact@terrilink.io
      name: Nous contacter

extra_css:
  - assets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search:
      lang: fr

# Navigation structurée en 5 sections principales :
# 1. Accueil
# 2. Réseaux Alumni (admin)
# 3. Réseaux Diaspora (admin)
# 4. Modules communs (partagés entre alumni/diaspora)
# 5. Releases & changelog
nav:
  - Accueil: index.md
  - Réseaux Alumni:
      - alumni/index.md
      - Espace administrateur:
          - alumni/admin/onboarding.md
          - alumni/admin/checklist-30-jours.md
          - alumni/admin/promotions.md
          - alumni/admin/schools.md
          - alumni/admin/publications.md
          - alumni/admin/settings.md
  - Réseaux Diaspora:
      - diaspora/index.md
      - Espace administrateur:
          - diaspora/admin/onboarding.md
          - diaspora/admin/checklist-30-jours.md
          - diaspora/admin/territory.md
          - diaspora/admin/chapters.md
          - diaspora/admin/country-targeting.md
          - diaspora/admin/settings.md
  - Modules métier:
      - shared/modules/network-radar.md
      - shared/modules/mentorat.md
      - shared/modules/marketplace-recruteur.md
      - shared/modules/rcp-enquete.md
  - Modules communs:
      - Profil et authentification:
          - shared/authentication.md
          - shared/profile.md
      - Communication:
          - shared/notifications.md
          - shared/messaging.md
      - Confidentialité et conformité:
          - shared/rgpd.md
      - Vie du réseau:
          - shared/events.md
      - Configuration:
          - shared/configuration/branding.md
          - shared/configuration/modules.md
          - shared/configuration/email-settings.md
          - shared/configuration/custom-domain.md
          - shared/configuration/permissions.md
      - Support:
          - shared/support/contact-support.md
          - shared/support/reporting-a-bug.md
          - shared/support/known-limitations.md
          - shared/support/release-policy.md
      - Glossaire et rôles:
          - shared/glossaire.md
          - shared/roles.md
      - FAQ générale:
          - shared/faq.md
  - Releases:
      - Versions de la plateforme:
          - releases/v1.0.md
